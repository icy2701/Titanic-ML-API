name : CI Pipeline
#display name on github actions tab.

on: [push,pull_request]
#Triggers — when does this workflow run? Every time you push code, and every time someone opens a pull request.
#So every single push to GitHub triggers this automatically.

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest tests/ -v